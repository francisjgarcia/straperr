name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: write
  packages: write
  security-events: write
  actions: write
  models: read

defaults:
  run:
    shell: bash
    working-directory: .

jobs:
  lint:
    name: Lint workflows
    if: github.event_name == 'pull_request'
    uses: francisjgarcia/actions-templates/.github/workflows/wf-lint.yml@main
    with:
      yamllint_paths: '.github/workflows/'

  pr-validation:
    name: Validate PR title
    if: github.event_name == 'pull_request'
    uses: francisjgarcia/actions-templates/.github/workflows/wf-pr-validation.yml@main

  setup:
    name: Setup environment
    if: |
      github.event_name == 'push' &&
      github.event.head_commit.message != 'Initial commit' &&
      !startsWith(github.event.head_commit.message, 'docs: update CHANGELOG.md')
    uses: francisjgarcia/actions-templates/.github/workflows/wf-setup.yml@main

  build:
    name: Build image
    needs: setup
    if: needs.setup.outputs.tag_version != ''
    uses: francisjgarcia/actions-templates/.github/workflows/wf-build.yml@main
    with:
      tag_version:       ${{ needs.setup.outputs.tag_version }}
      github_repository: ${{ github.repository }}
      author_name:       ${{ needs.setup.outputs.author_name }}
      author_email:      ${{ needs.setup.outputs.author_email }}
      repo_description:  ${{ needs.setup.outputs.repo_description }}
      created_at:        ${{ needs.setup.outputs.created_at }}

  tests:
    name: Test application
    needs: [setup, build]
    if: needs.setup.outputs.tag_version != ''
    uses: francisjgarcia/actions-templates/.github/workflows/wf-tests.yml@main
    with:
      tag_version:       ${{ needs.setup.outputs.tag_version }}
      github_repository: ${{ github.repository }}
      flake8_enabled:    true
      pytest_enabled:    true

  scan:
    name: Scan vulnerabilities
    needs: [setup, build]
    if: needs.setup.outputs.tag_version != ''
    uses: francisjgarcia/actions-templates/.github/workflows/wf-scan.yml@main
    with:
      tag_version:       ${{ needs.setup.outputs.tag_version }}
      github_repository: ${{ github.repository }}
      fail_on_critical:  true
      severity_cutoff:   critical
      only_fixed:        true

  push:
    name: Push to registry
    needs: [setup, tests, scan]
    if: needs.setup.outputs.tag_version != ''
    uses: francisjgarcia/actions-templates/.github/workflows/wf-push.yml@main
    with:
      tag_version:       ${{ needs.setup.outputs.tag_version }}
      github_repository: ${{ github.repository }}

  release:
    name: Tag and release
    needs: [setup, push]
    if: needs.setup.outputs.tag_version != ''
    uses: francisjgarcia/actions-templates/.github/workflows/wf-release.yml@main
    secrets:
      APP_ID:          ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    with:
      tag_version:       ${{ needs.setup.outputs.tag_version }}
      bump_type:         ${{ needs.setup.outputs.bump_type }}
      github_repository: ${{ github.repository }}
      changelog_entries: ${{ needs.setup.outputs.changelog_entries }}

  prepare-deploy:
    name: Prepare deploy secrets
    needs: [setup, push, release]
    if: needs.setup.outputs.tag_version != ''
    runs-on: ubuntu-latest
    outputs:
      app_env_vars: ${{ steps.combine.outputs.app_env_vars }}

    steps:
      - name: Combine secrets into app_env_vars
        id: combine
        env:
          HDOLIMPO_USERNAME: ${{ secrets.HDOLIMPO_USERNAME }}
          HDOLIMPO_PASSWORD: ${{ secrets.HDOLIMPO_PASSWORD }}
          SONARR_API_KEY:    ${{ secrets.SONARR_API_KEY }}
          SONARR4K_API_KEY:  ${{ secrets.SONARR4K_API_KEY }}
          RADARR_API_KEY:    ${{ secrets.RADARR_API_KEY }}
          RADARR4K_API_KEY:  ${{ secrets.RADARR4K_API_KEY }}
        run: |
          APP_ENV_VARS=$(jq -cn \
            --arg hdolimpo_username "miusuario" \
            --arg hdolimpo_password "$HDOLIMPO_PASSWORD" \
            --arg sonarr_api_key    "$SONARR_API_KEY" \
            --arg sonarr4k_api_key  "$SONARR4K_API_KEY" \
            --arg radarr_api_key    "$RADARR_API_KEY" \
            --arg radarr4k_api_key  "$RADARR4K_API_KEY" \
            '{
              HDOLIMPO_USERNAME: $hdolimpo_username,
              HDOLIMPO_PASSWORD: $hdolimpo_password,
              SONARR_API_KEY:    $sonarr_api_key,
              SONARR4K_API_KEY:  $sonarr4k_api_key,
              RADARR_API_KEY:    $radarr_api_key,
              RADARR4K_API_KEY:  $radarr4k_api_key
            }')
          echo "app_env_vars=$APP_ENV_VARS" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to server
    needs: [setup, prepare-deploy]
    if: needs.setup.outputs.tag_version != ''
    uses: francisjgarcia/actions-templates/.github/workflows/wf-deploy.yml@main
    with:
      tag_version:       ${{ needs.setup.outputs.tag_version }}
      github_repository: ${{ github.repository }}
      app_env_vars:      ${{ needs.prepare-deploy.outputs.app_env_vars }}
      containers: |
        [
          {
            "name": "straperr",
            "image": "ghcr.io/${{ github.repository }}:${{ needs.setup.outputs.tag_version }}",
            "network": "${{ vars.DOCKER_NETWORK }}",
            "healthcheck_url": "${{ vars.DOCKER_HEALTHCHECK_URL }}",
            "memory_limit": "${{ vars.DOCKER_MEMORY_LIMIT }}",
            "memory_reservation": "${{ vars.DOCKER_MEMORY_RESERVATION }}",
            "extra_networks": ["${{ vars.DOCKER_NETWORK_STRAPERR }}"],
            "env_vars": {
              "PUID": "1000",
              "PGID": "1000",
              "TZ": "Europe/Madrid",
              "FLASK_ENV": "${{ vars.FLASK_ENV }}",
              "FLASK_DEBUG": "${{ vars.FLASK_DEBUG }}",
              "SONARR_API_URL": "${{ vars.SONARR_API_URL }}",
              "SONARR4K_API_URL": "${{ vars.SONARR4K_API_URL }}",
              "RADARR_API_URL": "${{ vars.RADARR_API_URL }}",
              "RADARR4K_API_URL": "${{ vars.RADARR4K_API_URL }}"
            }
          },
          {
            "name": "straperr-selenium",
            "image": "selenium/standalone-chrome:latest",
            "network": "${{ vars.DOCKER_NETWORK_STRAPERR }}",
            "healthcheck_url": "http://localhost:4444/wd/hub/status",
            "memory_limit": "${{ vars.DOCKER_MEMORY_LIMIT_SELENIUM }}",
            "memory_reservation": "${{ vars.DOCKER_MEMORY_RESERVATION_SELENIUM }}",
            "env_vars": {
              "SE_ENABLE_TRACING": "false"
            }
          }
        ]
